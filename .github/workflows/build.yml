name: Build Ultra Tweak
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos
          
      - name: Setup iOS SDK
        run: |
          mkdir -p ~/theos/sdks
          curl -L https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz | tar -xJ -C ~/theos/sdks

      - name: Build Tweak
        run: |
          export THEOS=~/theos
          make clean package FINALPACKAGE=1

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: UltraAutoClicker-Build
          path: packages/*.deb
