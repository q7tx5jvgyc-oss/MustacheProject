name: Build Tweak
on: [push, workflow_dispatch]
jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git ~/theos
          mkdir -p ~/theos/sdks
          curl -L https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz | tar -xJ -C ~/theos/sdks
      - name: Build
        run: |
          export THEOS=~/theos
          make package FINALPACKAGE=1
      - uses: actions/upload-artifact@v4
        with:
          name: Tweak-Build
          path: packages/*.deb
